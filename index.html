<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Projects Profile</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My Portfolio</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">A searchable collection of my GitHub Pages</p>
        </header>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search through my projects..." autocomplete="off">
        </div>

        <div class="projects-grid" id="projectsGrid">
            <!-- Project Cards generated dynamically -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
